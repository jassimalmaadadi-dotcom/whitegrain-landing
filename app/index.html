<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>WhiteGrain</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #101010;
        --muted: #666666;
        --line: #e7e2dc;
        --bg: #f7f4ef;
        --card: #ffffff;
        --accent: #8a0f35;
      }
      * { box-sizing: border-box; }
      body {
        min-height: 100svh;
        margin: 0;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at 20% 10%, rgba(138, 15, 53, 0.08), transparent 32%), linear-gradient(180deg, #ffffff 0%, var(--bg) 100%);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(100% - 40px, 560px);
        padding: 42px 34px;
        border: 1px solid var(--line);
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.88);
        box-shadow: 0 24px 70px rgba(16, 16, 16, 0.08);
        text-align: center;
      }
      .brand {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 26px;
        font-weight: 900;
        letter-spacing: 0.02em;
      }
      .brand img { width: 34px; height: 34px; object-fit: contain; }
      h1 { margin: 0; font-size: clamp(2.2rem, 8vw, 4.4rem); line-height: 0.94; letter-spacing: -0.04em; }
      p { margin: 18px auto 0; max-width: 420px; color: var(--muted); font-size: 1.05rem; line-height: 1.55; }
      .status {
        display: inline-flex;
        margin-top: 28px;
        padding: 10px 16px;
        border: 1px solid rgba(138, 15, 53, 0.18);
        border-radius: 999px;
        background: rgba(138, 15, 53, 0.07);
        color: var(--accent);
        font-size: 0.82rem;
        font-weight: 900;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      @media (max-width: 560px) {
        main { width: min(100% - 28px, 420px); padding: 34px 22px; border-radius: 22px; }
        p { font-size: 0.98rem; }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="brand" aria-label="WhiteGrain">
        <img src="/assets/whitegrain-icon-black.png" alt="" />
        <span>WHITEGRAIN</span>
      </div>
      <h1>Website offline</h1>
      <p>WhiteGrain is not accepting uploads or public requests right now.</p>
      <span class="status">Temporarily unavailable</span>
    </main>
  </body>
</html>
