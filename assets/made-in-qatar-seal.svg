<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" role="img" aria-labelledby="title desc">
  <title id="title">Made in Qatar</title>
  <desc id="desc">A circular Made in Qatar seal with the Qatar flag in the center.</desc>
  <defs>
    <path id="bottomTextPath" d="M52 155a82 82 0 0 0 136 0" />
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#6b0f2d" flood-opacity="0.14" />
    </filter>
  </defs>

  <circle cx="120" cy="120" r="111" fill="#fff" filter="url(#softShadow)" />
  <circle cx="120" cy="120" r="101" fill="none" stroke="#8a1538" stroke-width="6" />
  <circle cx="120" cy="120" r="73" fill="none" stroke="#8a1538" stroke-width="3.5" opacity="0.9" />

  <text x="120" y="57" text-anchor="middle" direction="rtl"
    font-family="Arial, Tahoma, sans-serif" font-size="24" font-weight="800" fill="#8a1538">&#1589;&#1606;&#1593; &#1601;&#1610; &#1602;&#1591;&#1585;</text>

  <text font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="900" letter-spacing="1.4" fill="#8a1538">
    <textPath href="#bottomTextPath" startOffset="50%" text-anchor="middle">MADE IN QATAR</textPath>
  </text>

  <text x="45" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="900" fill="#8a1538">&#9733;</text>
  <text x="195" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="900" fill="#8a1538">&#9733;</text>

  <g transform="translate(120 120)">
