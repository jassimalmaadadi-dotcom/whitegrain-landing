    <clipPath id="flagClip">
      <circle r="43" />
    </clipPath>
    <g clip-path="url(#flagClip)">
      <rect x="-43" y="-43" width="86" height="86" fill="#8a1538" />
      <path fill="#fff" d="
        M -43 -43
        L -10 -43
        L 1 -34
        L -10 -25
        L 1 -16
        L -10 -7
        L 1 2
        L -10 11
        L 1 20
        L -10 29
        L 1 38
        L -10 47
        L -43 47
        Z" />
    </g>
    <circle r="43" fill="none" stroke="#8a1538" stroke-width="2" />
  </g>
